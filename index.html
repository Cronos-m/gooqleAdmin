<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gooqle Admin Maestro</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; text-align: center; padding: 15px; margin: 0; }
        .box { background: #1e293b; padding: 20px; border-radius: 10px; width: 100%; max-width: 500px; margin: 0 auto; }
        input { padding: 15px; width: 100%; border-radius: 5px; border: none; margin-bottom: 15px; box-sizing: border-box; }
        .button-group { display: flex; flex-direction: column; gap: 10px; }
        button { padding: 12px; border: none; color: white; cursor: pointer; border-radius: 5px; width: 100%; font-size: 16px; }
        .blue-btn { background: #3b82f6; } .red-btn { background: #ef4444; } .gray-btn { background: #64748b; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th, td { padding: 10px; border-bottom: 1px solid #334155; font-size: 14px; }
    </style>
</head>
<body>

    <div id="login-section" class="box">
        <h1>Acceso al Panel</h1>
        <button class="blue-btn" onclick="googleLogin()">Iniciar Sesión con Google</button>
    </div>

    <div id="admin-section" class="box" style="display:none;">
        <h1>Panel Maestro</h1>
        <input type="text" id="sala" placeholder="Nombre de la nueva sala">
        <div class="button-group">
            <button class="blue-btn" onclick="gestionarSala()">Crear Sala</button>
            <button class="gray-btn" onclick="cerrarSesion()">Cerrar Sesión</button>
        </div>
        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #334155;">
        <h2>Salas Activas</h2>
        <table><thead><tr><th>Sala</th><th>Acción</th></tr></thead><tbody id="listaSalas"></tbody></table>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBi0obHdwbHfhWhgsk0ZEvDqYryKISOZn8",
            authDomain: "gooqledata.firebaseapp.com",
            databaseURL: "https://gooqledata-default-rtdb.firebaseio.com",
            projectId: "gooqledata",
            storageBucket: "gooqledata.firebasestorage.app",
            messagingSenderId: "449823780048",
            appId: "1:449823780048:web:2bc34766c04d0b39f5c2d5",
            measurementId: "G-GXZKGD7KLF"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        function googleLogin() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function cerrarSesion() { auth.signOut().then(() => window.location.reload()); }

        auth.onAuthStateChanged(user => {
            if (user && user.email === "luistorresbruno52@gmail.com") {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('admin-section').style.display = 'block';
                cargarSalas();
            }
        });

        function gestionarSala() {
            const sala = document.getElementById('sala').value.trim().replace(/\s+/g, '-');
            if (!sala) return;
            const baseUrl = "https://gooqledata.web.app";
            const links = {
                google: `${baseUrl}/g${sala}`,
                youtube: `${baseUrl}/yt${sala}`,
                monitor: `${baseUrl}/m${sala}`
            };
            db.ref('salas/' + sala).set({ creadoPor: auth.currentUser.email, links }).then(() => {
                alert("Sala creada.");
                enviarTelegram(sala);
            });
        }

        function cargarSalas() {
            db.ref('salas').on('value', (snapshot) => {
                const lista = document.getElementById('listaSalas');
                lista.innerHTML = "";
                snapshot.forEach((child) => {
                    const nombre = child.key;
                    const linksStr = JSON.stringify(child.val().links).replace(/"/g, '&quot;');
                    lista.innerHTML += `<tr><td>${nombre}</td><td>
                        <button class="red-btn" style="padding:4px; font-size:10px;" onclick="eliminarSala('${nombre}')">Eliminar</button>
                        <button style="padding:4px; font-size:10px; background:#10b981;" onclick="enviarTelegram('${nombre}')">Telegram</button>
                        <button style="padding:4px; font-size:10px; background:#8b5cf6;" onclick="enviarWhatsApp(${linksStr})">WhatsApp</button>
                    </td></tr>`;
                });
            });
        }

        function enviarWhatsApp(links) {
            const telefono = prompt("Número (ej: 573001234567):");
            if (telefono) {
                // --- AQUÍ PUEDES EDITAR EL MENSAJE ---
                const mensaje = `¡Hola! Aquí tienes tus accesos exclusivos:\n\nGoogle: ${links.google}\nYouTube: ${links.youtube}\nPanel: ${links.monitor}\n\n¡Gracias por usar nuestro servicio!`;
                // --------------------------------------
                window.open(`https://wa.me/${telefono}?text=${encodeURIComponent(mensaje)}`, '_blank');
            }
        }

        function eliminarSala(n) { if (confirm("¿Eliminar "+n+"?")) db.ref('salas/'+n).remove(); }
        function enviarTelegram(s) { fetch("https://hook.us2.make.com/g8tssskmt41fywhbdabmssisov57ky92", { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({sala: s}) }); }
    </script>
</body>
</html>
